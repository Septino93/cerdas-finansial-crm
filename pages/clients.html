<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client - Cerdas Finansial</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/crm.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <main class="mobile-app">
    <header class="page-head">
      <div class="page-titlebar">
        <a class="icon-back" href="dashboard.html" aria-label="Kembali ke Dashboard" title="Kembali ke Dashboard"><i data-lucide="arrow-left"></i></a>
        <h1>Client</h1>
        <span class="title-spacer" aria-hidden="true"></span>
      </div>
      <p>Database internal. Client tidak perlu login ke Cerdas Finansial.</p>
    </header>

    <section class="client-stats" aria-label="Statistik client">
      <article class="client-stat-card">
        <span>Total</span>
        <strong id="totalClientStat">0</strong>
      </article>
      <article class="client-stat-card">
        <span>Aktif</span>
        <strong id="activeClientStat">0</strong>
      </article>
      <article class="client-stat-card">
        <span>Nonaktif</span>
        <strong id="inactiveClientStat">0</strong>
      </article>
    </section>

    <section class="client-toolbar" aria-label="Pencarian dan filter client">
      <div class="client-search-box">
        <i data-lucide="search"></i>
        <input id="searchClient" type="search" autocomplete="off" placeholder="Cari nama, WhatsApp, atau email..." aria-label="Cari client">
        <button id="clearClientSearch" type="button" aria-label="Hapus pencarian" title="Hapus pencarian" hidden><i data-lucide="x"></i></button>
      </div>
      <div class="client-filter-row">
        <select id="clientStatusFilter" aria-label="Filter status client">
          <option value="all">Semua Client</option>
          <option value="active">Aktif</option>
          <option value="inactive">Nonaktif</option>
        </select>
        <select id="clientSort" aria-label="Urutkan client">
          <option value="newest">Terbaru</option>
          <option value="oldest">Terlama</option>
          <option value="name_asc">Nama A–Z</option>
          <option value="name_desc">Nama Z–A</option>
        </select>
      </div>
      <p class="client-result-info" id="clientResultInfo">Memuat data client...</p>
    </section>

    <section class="client-list-heading" aria-label="Daftar client">
      <div>
        <span>DATABASE CLIENT</span>
        <h2>Daftar Client</h2>
      </div>
      <button class="client-add-inline" id="openClientModalTop" type="button">
        <i data-lucide="plus"></i> Tambah
      </button>
    </section>

    <section class="list client-list-section" id="clientList" aria-live="polite"></section>

    <button class="client-fab" id="openClientModalFab" type="button" aria-label="Tambah client" title="Tambah client">
      <i data-lucide="plus"></i>
    </button>

    <section class="client-add-modal" id="clientAddModal" hidden aria-hidden="true">
      <button class="client-modal-backdrop" id="clientModalBackdrop" type="button" aria-label="Tutup form tambah client"></button>
      <div class="client-modal-sheet" role="dialog" aria-modal="true" aria-labelledby="clientModalTitle">
        <div class="client-modal-handle" aria-hidden="true"></div>
        <header class="client-modal-head">
          <div>
            <span>CLIENT BARU</span>
            <h2 id="clientModalTitle">Tambah Client</h2>
            <p>Masukkan data dasar client. Data dapat diedit kembali kapan saja.</p>
          </div>
          <button class="client-modal-close" id="closeClientModal" type="button" aria-label="Tutup">
            <i data-lucide="x"></i>
          </button>
        </header>

        <form class="client-modal-form" id="clientForm">
          <label for="clientName">Nama Lengkap <span class="required-mark">*</span></label>
          <input id="clientName" autocomplete="name" required placeholder="Contoh: Budi Santoso">

          <label for="clientPhone">No. WhatsApp</label>
          <input id="clientPhone" inputmode="tel" autocomplete="tel" placeholder="Contoh: 0812 3456 7890">

          <label for="clientEmail">Email</label>
          <input id="clientEmail" type="email" autocomplete="email" placeholder="nama@email.com">

          <label for="clientCredit">Credit Awal</label>
          <input id="clientCredit" type="number" min="0" value="2">

          <div class="client-modal-actions">
            <button class="btn btn-secondary" id="cancelClientModal" type="button">Batal</button>
            <button class="btn btn-primary" type="submit">Simpan Client</button>
          </div>
        </form>
      </div>
    </section>

    <nav class="bottom-nav bottom-nav-six">
      <a href="dashboard.html" data-nav="dashboard"><i data-lucide="home"></i>Home</a>
      <a href="clients.html" data-nav="clients"><i data-lucide="users"></i>Client</a>
      <a href="bookings.html" data-nav="bookings"><i data-lucide="calendar-check"></i>Konsultasi</a>
      <a href="analysis.html" data-nav="analysis"><i data-lucide="chart-no-axes-combined"></i>Analisis</a>
      <a href="payments.html" data-nav="payments"><i data-lucide="wallet-cards"></i>Bayar</a>
      <a href="profile.html" data-nav="profile"><i data-lucide="user"></i>Profil</a>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js?v=supa1"></script>
  <script src="../js/supabase-client.js?v=supa1"></script>
  <script src="../js/api.js?v=supa1"></script>
  <script src="../js/auth.js?v=supa1"></script>
  <script src="../js/clients.js?v=clientmodal1"></script>
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      document.querySelector('[data-nav="clients"]')?.classList.add('active');
      if(window.lucide)lucide.createIcons();
    });
  </script>
</body>
</html>
