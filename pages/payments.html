<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pembayaran - Cerdas Finansial</title><link rel="stylesheet" href="../css/app.css"><link rel="stylesheet" href="../css/crm.css"><script src="https://unpkg.com/lucide@latest"></script><script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script></head><body><main class="mobile-app"><header class="page-head"><div class="page-titlebar"><a class="icon-back" href="dashboard.html" aria-label="Kembali ke Dashboard" title="Kembali ke Dashboard"><i data-lucide="arrow-left"></i></a><h1>Pembayaran</h1><span class="title-spacer" aria-hidden="true"></span></div><p>Status pembayaran Midtrans, invoice, dan tagihan manual.</p></header><div class="toolbar"><select id="paymentFilter"><option value="">Semua Status</option><option value="pending">Pending</option><option value="paid">Lunas</option><option value="failed">Gagal</option><option value="expired">Kedaluwarsa</option></select></div><section class="client-list-heading payment-list-heading"><div><span>DATABASE PEMBAYARAN</span><h2>Daftar Tagihan</h2></div><button class="client-add-inline" id="openPaymentModal" type="button"><i data-lucide="plus"></i> Tambah</button></section><section class="list payment-list-section" id="paymentList"></section><nav class="bottom-nav bottom-nav-six"><a href="dashboard.html" data-nav="dashboard"><i data-lucide="home"></i>Home</a><a href="clients.html" data-nav="clients"><i data-lucide="users"></i>Client</a><a href="bookings.html" data-nav="bookings"><i data-lucide="calendar-check"></i>Konsultasi</a><a href="analysis.html" data-nav="analysis"><i data-lucide="chart-no-axes-combined"></i>Analisis</a><a href="payments.html" data-nav="payments"><i data-lucide="wallet-cards"></i>Bayar</a><a href="profile.html" data-nav="profile"><i data-lucide="user"></i>Profil</a></nav></main>
<section class="client-add-modal" id="paymentAddModal" hidden aria-hidden="true"><button class="client-modal-backdrop" id="paymentModalBackdrop" type="button" aria-label="Tutup form tagihan"></button><div class="client-modal-sheet" role="dialog" aria-modal="true" aria-labelledby="paymentModalTitle"><div class="client-modal-handle"></div><header class="client-modal-head"><div><span>TAGIHAN BARU</span><h2 id="paymentModalTitle">Buat Tagihan Manual</h2><p>Buat tagihan Midtrans dengan nominal bebas, lalu kirim link pembayaran ke client.</p></div><button class="client-modal-close" id="closePaymentModal" type="button"><i data-lucide="x"></i></button></header><form class="client-modal-form payment-modal-form" id="manualPaymentForm"><label for="manualPaymentClient">Client <span class="required-mark">*</span></label><select id="manualPaymentClient" required></select><label for="manualPaymentName">Nama tagihan <span class="required-mark">*</span></label><input id="manualPaymentName" maxlength="80" required placeholder="Contoh: Test Payment"><label for="manualPaymentAmount">Nominal <span class="required-mark">*</span></label><input id="manualPaymentAmount" type="number" min="1" step="1" required placeholder="10000"><label for="manualPaymentNotes">Catatan</label><textarea id="manualPaymentNotes" placeholder="Catatan untuk internal CRM (opsional)"></textarea><div class="client-modal-actions"><button class="btn btn-secondary" id="cancelPaymentModal" type="button">Batal</button><button class="btn btn-primary" id="saveManualPaymentBtn" type="submit">Buat Tagihan</button></div></form></div></section>
