<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Konsultasi - Cerdas Finansial</title><link rel="stylesheet" href="../css/app.css"><link rel="stylesheet" href="../css/crm.css"><script src="https://unpkg.com/lucide@latest"></script></head><body><main class="mobile-app"><header class="page-head"><div class="page-titlebar"><a class="icon-back" href="dashboard.html" aria-label="Kembali ke Dashboard" title="Kembali ke Dashboard"><i data-lucide="arrow-left"></i></a><h1>Konsultasi</h1><span class="title-spacer" aria-hidden="true"></span></div><p>Permintaan dari Website Personal masuk ke sini. Pemilihan jadwal tetap dilanjutkan melalui WhatsApp.</p></header><div class="toolbar"><select id="bookingFilter"><option value="">Semua Status</option><option value="waiting_payment">Menunggu Pembayaran</option><option value="waiting_schedule">Menunggu Penjadwalan</option><option value="confirmed">Dikonfirmasi</option><option value="completed">Selesai</option><option value="cancelled">Dibatalkan</option></select></div><form class="form" id="bookingForm"><h2>Tambah Konsultasi Manual</h2><label>Client</label><select id="bookingClient" required></select><label>Layanan</label><select id="bookingService"><option>Asuransi Jiwa</option><option>Penyakit Kritis</option><option>Asuransi Kesehatan</option><option>Dana Pendidikan</option><option>Dana Pensiun</option><option>Review Polis</option><option>Financial Check Up</option></select><label>Metode</label><select id="bookingMethod"><option value="free_credit">Credit Gratis</option><option value="midtrans">Midtrans / Berbayar</option></select><label>Catatan</label><textarea id="bookingNotes"></textarea><button class="btn btn-primary btn-block">Buat Konsultasi</button></form><section class="list" id="bookingList"></section><nav class="bottom-nav bottom-nav-six"><a href="dashboard.html" data-nav="dashboard"><i data-lucide="home"></i>Home</a><a href="clients.html" data-nav="clients"><i data-lucide="users"></i>Client</a><a href="bookings.html" data-nav="bookings"><i data-lucide="calendar-check"></i>Konsultasi</a><a href="analysis.html" data-nav="analysis"><i data-lucide="chart-no-axes-combined"></i>Analisis</a><a href="payments.html" data-nav="payments"><i data-lucide="wallet-cards"></i>Bayar</a><a href="profile.html" data-nav="profile"><i data-lucide="user"></i>Profil</a></nav></main>
<div id="scheduleModal" class="crm-modal" hidden>
  <div class="crm-modal-backdrop" data-close-schedule></div>
  <section class="crm-modal-panel" role="dialog" aria-modal="true" aria-labelledby="scheduleTitle">
    <div class="crm-modal-head">
      <div><small>ATUR JADWAL</small><h2 id="scheduleTitle">Jadwal Meeting</h2></div>
      <button type="button" class="crm-modal-close" data-close-schedule aria-label="Tutup"><i data-lucide="x"></i></button>
    </div>
    <div class="schedule-summary">
      <strong id="scheduleService">Konsultasi</strong>
      <span id="scheduleClient">Client</span>
      <small id="scheduleNumber">-</small>
    </div>
    <form id="scheduleForm" class="form schedule-form">
      <input type="hidden" id="scheduleId">
      <input type="hidden" id="schedulePhone">
      <label for="scheduleDate">Tanggal meeting</label>
      <input id="scheduleDate" type="date" required>
      <label for="scheduleTime">Jam meeting</label>
      <input id="scheduleTime" type="time" required>
      <label for="scheduleMethod">Metode meeting</label>
      <select id="scheduleMethod" required>
        <option value="Google Meet">Google Meet</option>
        <option value="Zoom">Zoom</option>
        <option value="WhatsApp Call">WhatsApp Call</option>
        <option value="Offline">Offline</option>
      </select>
      <label for="scheduleLink">Link meeting / lokasi</label>
      <input id="scheduleLink" placeholder="https://meet.google.com/... atau alamat">
      <label for="scheduleNotes">Catatan</label>
      <textarea id="scheduleNotes" placeholder="Catatan tambahan untuk client"></textarea>
      <button id="saveScheduleBtn" class="btn btn-primary btn-block" type="submit">Simpan Jadwal</button>
      <button id="sendScheduleWaBtn" class="btn btn-secondary btn-block" type="button" hidden>Kirim Jadwal via WhatsApp</button>
    </form>
  </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="../js/config.js?v=supa1"></script><script src="../js/supabase-client.js?v=supa1"></script><script src="../js/api.js?v=stage3schedule1"></script><script src="../js/auth.js?v=supa1"></script><script src="../js/bookings.js?v=stage3schedule1"></script><script>document.addEventListener('DOMContentLoaded',()=>{document.querySelector('[data-nav="bookings"]')?.classList.add('active');if(window.lucide)lucide.createIcons();});</script></body></html>
